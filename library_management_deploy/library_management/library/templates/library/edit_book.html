{% extends "library/base.html" %}
{% block content %}

<div class="container mt-4">
    <h3>Edit Book</h3>

    <form method="post">
        {% csrf_token %}

        <div class="card p-4 shadow-sm">
            {{ form.as_p }}

            <div class="mt-3">
                <button type="submit" class="btn btn-success">
                    Update Book
                </button>
                <a href="{% url 'books' %}" class="btn btn-secondary">
                    Cancel
                </a>
            </div>
        </div>
    </form>
</div>

{% endblock %}
