{% extends "library/base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow p-4">
        <h3 class="text-primary mb-4">➕ Add New Book</h3>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn btn-success w-100">
                Add Book
            </button>
        </form>
    </div>
</div>
{% endblock %}
